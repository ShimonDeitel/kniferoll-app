<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knife Roll</title>
<style>
  body { margin:0; background:#141210; color:#ece9e4; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width:560px; padding:40px 24px; }
  h1 { font-size:2.2rem; color:#8C6A56; margin-bottom:0.4em; }
  p { font-size:1.05rem; line-height:1.6; color:#c8c5c0; }
  .badge { display:inline-block; margin-top:1.5em; padding:10px 22px; border:1px solid #8C6A56; border-radius:24px; color:#8C6A56; text-decoration:none; }
  footer { margin-top:3em; font-size:0.85rem; color:#7a766f; }
  a { color:#8C6A56; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8C6A5655 0%, #8C6A5600 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Knife Roll</h1>
  <p>Inventory a knife collection with steel type and sharpening dates.</p>
  <p>Free tier: Log knives with steel type and photo. Upgrade to Pro for Sharpening-schedule reminders and edge-log history.</p>
  <a class="badge" href="privacy.html">Privacy</a>
  <a class="badge" href="terms.html">Terms</a>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>

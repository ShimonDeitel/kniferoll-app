name: KnifeRoll
options:
  bundleIdPrefix: com.shimondeitel.kniferoll
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  KnifeRoll:
    type: application
    platform: iOS
    sources:
      - path: KnifeRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kniferoll
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: KnifeRoll/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KnifeRollTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KnifeRollTests
      - path: KnifeRoll.storekit
    dependencies:
      - target: KnifeRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kniferoll.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KnifeRollUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KnifeRollUITests
    dependencies:
      - target: KnifeRoll
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.kniferoll.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  KnifeRoll:
    build:
      targets:
        KnifeRoll: all
        KnifeRollTests: [test]
        KnifeRollUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: KnifeRoll.storekit
    test:
      config: Debug
      storeKitConfiguration: KnifeRoll.storekit
      targets:
        - KnifeRollTests
        - KnifeRollUITests
    archive:
      config: Release
